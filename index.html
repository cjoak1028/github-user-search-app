<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" async></script>

    <title>Frontend Mentor | GitHub user search app</title>
  </head>
  <body class="body">
    <div class="container">
      <header class="header">
        <h1 class="logo">devfinder</h1>
        <button class="mode-toggle">
          <h4 class="mode-toggle__title">Dark</h4>
          <img
            class="icon-light"
            src="./assets/light-mode/icon-moon.svg"
            alt="moon icon"
          />
          <img
            class="icon-dark"
            src="./assets/dark-mode/icon-sun.svg"
            alt="sun icon"
          />
        </button>
      </header>
      <main class="main">
        <div class="form-group">
          <img
            src="./assets/icon-search.svg"
            alt="search icon"
            class="search-icon"
          />
          <input
            type="search"
            class="form-control"
            placeholder="Search GitHub username&hellip;"
          />
          <button type="button" class="btn btn--search">Search</button>
        </div>
        <div class="profile-container">
          <div class="user-profile">
            <div class="user-profile__summary">
              <div class="user-profile__photo"></div>
              <div class="user-profile__text">
                <div class="user-wrapper">
                  <h3 class="user-name">The Octocat</h3>
                  <h4 class="user-id">@octocat</h4>
                </div>
                <h4 class="user-date-joined">Joined 25 Jan 2011</h4>
              </div>
            </div>
            <p class="user-description">
              Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Donec
              odio. Quisque volutpat mattis eros.
            </p>
            <div class="user-stats-wrapper">
              <div class="user-stats">
                <div class="user-stat">
                  <h4 class="stat-label">Repos</h4>
                  <p class="stat-data">8</p>
                </div>
                <div class="user-stat">
                  <h4 class="stat-label">Followers</h4>
                  <p class="stat-data">3938</p>
                </div>
                <div class="user-stat">
                  <h4 class="stat-label">Following</h4>
                  <p class="stat-data">9</p>
                </div>
              </div>
            </div>
            <div class="grid-items">
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-location.svg"
                  alt="location icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-location-dark.svg"
                  alt="location icon"
                />
                <p>San Francisco</p>
              </div>
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-website.svg"
                  alt="website icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-website-dark.svg"
                  alt="website icon"
                />
                <p>https://github.blog</p>
              </div>
              <div class="grid-item not-available">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-twitter.svg"
                  alt="twitter icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-twitter-dark.svg"
                  alt="twitter icon"
                />
                <p>Not Available</p>
              </div>
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-company.svg"
                  alt="company icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-company-dark.svg"
                  alt="company icon"
                />
                <p>@github</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- devfinder Light Dark Search GitHub username... Search Joined Repos Followers
    Following -->
  </body>
</html>
