<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" async></script>

    <title>Frontend Mentor | GitHub user search app</title>
  </head>
  <body>
    <div class="container">
      <header class="header mb-lg">
        <h1 class="heading-1 logo">devfinder</h1>
        <button class="mode-toggle">
          <h4 class="heading-4 mode-toggle__title">Dark</h4>
        </button>
      </header>
      <main class="main">
        <div class="search-group">
          <img
            src="./assets/icon-search.svg"
            alt="search icon"
            class="search-icon"
          />
          <input
            type="search"
            class="search-control"
            placeholder="Search GitHub username..."
          />
          <button type="button" class="btn btn--search">Search</button>
        </div>
      </main>
    </div>
    <!-- devfinder Light Dark Search GitHub username... Search Joined Repos Followers
    Following -->
  </body>
</html>
