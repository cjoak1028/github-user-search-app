<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script type="text/javascript" src="config.js"></script>
    <script type="module" src="script.js" async></script>

    <title>Frontend Mentor | GitHub user search app</title>
  </head>
  <body class="body">
    <div class="container">
      <header class="header">
        <h1 class="logo">devfinder</h1>
        <button class="mode-toggle">
          <h4 class="mode-toggle__title">Dark</h4>
          <svg
            class="icon-moon"
            width="20"
            height="20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19.513 11.397a.701.701 0 00-.588.128 7.496 7.496 0 01-2.276 1.336 7.101 7.101 0 01-2.583.462 7.505 7.505 0 01-5.32-2.209 7.568 7.568 0 01-2.199-5.342c0-.873.154-1.72.41-2.49a6.904 6.904 0 011.227-2.21.657.657 0 00-.102-.924.701.701 0 00-.589-.128C5.32.61 3.427 1.92 2.072 3.666A10.158 10.158 0 000 9.83c0 2.8 1.125 5.342 2.967 7.19a10.025 10.025 0 007.16 2.98c2.353 0 4.527-.822 6.266-2.183a10.13 10.13 0 003.58-5.624.623.623 0 00-.46-.796z"
              fill="#697C9A"
              fill-rule="nonzero"
            />
          </svg>
          <svg
            class="icon-sun"
            width="20"
            height="20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g fill="#FFF" fill-rule="nonzero">
              <path
                d="M13.545 6.455c-.9-.9-2.17-1.481-3.545-1.481a4.934 4.934 0 00-3.545 1.481c-.9.9-1.481 2.17-1.481 3.545 0 1.376.582 2.646 1.481 3.545.9.9 2.17 1.481 3.545 1.481a4.934 4.934 0 003.545-1.481c.9-.9 1.481-2.17 1.481-3.545a4.934 4.934 0 00-1.481-3.545zM10 3.413a.7.7 0 00.688-.688V.688A.7.7 0 0010 0a.7.7 0 00-.688.688v2.037a.7.7 0 00.688.688zM15.635 5.344l1.455-1.455a.67.67 0 000-.952.67.67 0 00-.952 0l-1.455 1.455a.67.67 0 000 .952c.238.264.66.264.952 0zM19.312 9.312h-2.037a.7.7 0 00-.688.688.7.7 0 00.688.688h2.037A.7.7 0 0020 10a.7.7 0 00-.688-.688zM15.608 14.656a.67.67 0 00-.952 0 .67.67 0 000 .952l1.455 1.455a.67.67 0 00.952 0 .67.67 0 000-.952l-1.455-1.455zM10 16.587a.7.7 0 00-.688.688v2.037A.7.7 0 0010 20a.7.7 0 00.688-.688v-2.037a.7.7 0 00-.688-.688zM4.365 14.656L2.91 16.111a.67.67 0 000 .952.67.67 0 00.952 0l1.455-1.455a.67.67 0 000-.952c-.238-.264-.66-.264-.952 0zM3.413 10a.7.7 0 00-.688-.688H.688A.7.7 0 000 10a.7.7 0 00.688.688h2.037A.7.7 0 003.413 10zM4.365 5.344a.67.67 0 00.952 0 .67.67 0 000-.952L3.862 2.937a.67.67 0 00-.952 0 .67.67 0 000 .952l1.455 1.455z"
              />
            </g>
          </svg>
        </button>
      </header>
      <main class="main">
        <form class="form-group">
          <img
            src="./assets/icon-search.svg"
            alt="search icon"
            class="search-icon"
          />
          <input
            type="search"
            class="form-control"
            placeholder="Search GitHub username&hellip;"
          />
          <button type="submit" class="btn btn--search">Search</button>
        </form>
        <div class="profile-container">
          <div class="user-profile">
            <div class="user-profile__summary">
              <div class="user-profile__photo"></div>
              <div class="user-profile__text">
                <div class="user-wrapper">
                  <h3 class="user-name">The Octocat</h3>
                  <h4 class="user-id">@octocat</h4>
                </div>
                <h4 class="user-date-joined">Joined 25 Jan 2011</h4>
              </div>
            </div>
            <p class="user-description">
              Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Donec
              odio. Quisque volutpat mattis eros.
            </p>
            <div class="user-stats-wrapper">
              <div class="user-stats">
                <div class="user-stat">
                  <h4 class="stat-label">Repos</h4>
                  <p class="stat-data">8</p>
                </div>
                <div class="user-stat">
                  <h4 class="stat-label">Followers</h4>
                  <p class="stat-data">3938</p>
                </div>
                <div class="user-stat">
                  <h4 class="stat-label">Following</h4>
                  <p class="stat-data">9</p>
                </div>
              </div>
            </div>
            <div class="grid-items">
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-location.svg"
                  alt="location icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-location-dark.svg"
                  alt="location icon"
                />
                <p>San Francisco</p>
              </div>
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-website.svg"
                  alt="website icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-website-dark.svg"
                  alt="website icon"
                />
                <p>https://github.blog</p>
              </div>
              <div class="grid-item not-available">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-twitter.svg"
                  alt="twitter icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-twitter-dark.svg"
                  alt="twitter icon"
                />
                <p>Not Available</p>
              </div>
              <div class="grid-item">
                <img
                  class="icon"
                  src="./assets/light-mode/icon-company.svg"
                  alt="company icon"
                />
                <img
                  class="icon"
                  src="./assets/dark-mode/icon-company-dark.svg"
                  alt="company icon"
                />
                <p>@github</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- devfinder Light Dark Search GitHub username... Search Joined Repos Followers
    Following -->
  </body>
</html>
